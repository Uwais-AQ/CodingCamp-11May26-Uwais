<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Pengeluaran Anggaran - Uwais</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light-theme"> <div class="container">
        <header>
            <h1>Dashboard</h1>
            <button id="theme-toggle">🌙/🌞</button>
        </header>

        <section class="balance-card">
            <p>TOTAL PENGELUARAN</p>
            <h2 id="total-balance">$0.00</h2>
        </section>

        <div class="main-grid">
            <aside>
                <div class="card">
                    <h3>Tambah Transaksi</h3>
                    <form id="transaction-form">
                        <input type="text" id="item-name" placeholder="Nama Barang (misal: Cilok)" required>
                        <input type="number" id="amount" placeholder="Jumlah (misal: 15.00)" step="0.01" required>
                        <select id="category-select" required>
                            <option value="" disabled selected>Pilih kategori</option>
                            </select>
                        <button type="submit" class="btn-primary">Tambah</button>
                    </form>
                </div>

                <div class="card">
                <h3>Kelola Kategori (Maks 5)</h3>
                <div id="category-list" class="tag-container"></div> <div class="category-input-group">
                    <input type="text" id="new-category" placeholder="Kategori baru">
                    <button id="add-category-btn">+</button>
                </div>
</div>
            </aside>

            <main>
                <div class="card">
                    <h3>Pengeluaran per Kategori</h3>
                    <canvas id="expense-chart"></canvas>
                </div>

                <div class="card">
                    <div class="list-header">
                        <h3>Riwayat Transaksi</h3>
                        <select id="sort-category">
                            <option value="all">Semua Kategori</option>
                        </select>
                    </div>
                    <div id="transaction-list" class="scrollable-list">
                        </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
